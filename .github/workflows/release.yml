# 推送 tag v* 时自动构建 Windows（zip + Setup.exe）与 macOS（DMG），并发布到 GitHub Releases。
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows (zip + Setup.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          $installer = "$env:RUNNER_TEMP\innosetup.exe"
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe?site=1" -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART" -Wait

      - name: Build release artifacts
        shell: pwsh
        run: ./scripts/build-release.ps1

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            dist/CodexHelper-*-win64.zip
            dist/CodexHelper-*-Setup.exe
          if-no-files-found: error

  build-macos:
    name: macOS (DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build universal .app and DMG
        run: |
          chmod +x scripts/build-macos-release.sh
          ./scripts/build-macos-release.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: dist/*.dmg
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release notes from CHANGELOG
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 <<'PY' "$VERSION"
          import re, sys
          version = sys.argv[1]
          text = open("CHANGELOG.md", encoding="utf-8").read()
          pattern = rf"^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|\Z)"
          match = re.search(pattern, text, re.M | re.S)
          body = match.group(0).strip() if match else f"Release v{version}"
          open("release-body.md", "w", encoding="utf-8").write(body)
          PY

      - name: List release files
        run: find artifacts -type f -print

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-body.md
          files: artifacts/**
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
